<svg viewBox="0 0 1920 1080" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1410;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f0a07;stop-opacity:1" />
    </linearGradient>
    <filter id="blur">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" />
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1920" height="1080" fill="url(#grad1)"/>
  
  <!-- Decorative swirls -->
  <path d="M -50 200 Q 200 150 300 250 T 600 300" stroke="#8B6F47" stroke-width="2" fill="none" opacity="0.3" filter="url(#blur)"/>
  <path d="M 1920 150 Q 1700 200 1500 300 T 1200 400" stroke="#8B6F47" stroke-width="2" fill="none" opacity="0.3" filter="url(#blur)"/>
  <path d="M 100 800 Q 400 850 600 750 T 1000 700" stroke="#A89968" stroke-width="2.5" fill="none" opacity="0.25" filter="url(#blur)"/>
  <path d="M 1800 950 Q 1400 900 1000 850 T 400 900" stroke="#8B6F47" stroke-width="2" fill="none" opacity="0.2" filter="url(#blur)"/>
  
  <!-- Circular accent elements -->
  <circle cx="200" cy="300" r="100" stroke="#8B6F47" stroke-width="1" fill="none" opacity="0.15"/>
  <circle cx="1700" cy="700" r="150" stroke="#A89968" stroke-width="1.5" fill="none" opacity="0.15"/>
  
  <!-- Subtle corner accents -->
  <path d="M 0 0 Q 100 50 150 0" stroke="#8B6F47" stroke-width="1" fill="none" opacity="0.2"/>
  <path d="M 1920 0 Q 1820 50 1770 0" stroke="#8B6F47" stroke-width="1" fill="none" opacity="0.2"/>
  <path d="M 0 1080 Q 100 1030 150 1080" stroke="#A89968" stroke-width="1.5" fill="none" opacity="0.2"/>
  <path d="M 1920 1080 Q 1820 1030 1770 1080" stroke="#A89968" stroke-width="1.5" fill="none" opacity="0.2"/>
</svg>
